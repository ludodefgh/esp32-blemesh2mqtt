<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLE Mesh Bridge</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <h1>BLE Mesh Bridge</h1>
    <div class="status-indicator" id="status"></div>
  </header>

  <main class="main-content">
    <div class="grid">
      <!-- Log Section -->
      <section class="card log-section">
        <h2>System Logs</h2>
        <div class="log-container">
          <div id="log-output" class="log-output"></div>
          <div class="log-controls">
            <button class="btn btn-secondary" onclick="clearLogs()">Clear</button>
            <label class="checkbox-label">
              <input type="checkbox" id="auto-scroll" checked>
              Auto-scroll
            </label>
          </div>
        </div>
      </section>

      <!-- Provisioned Nodes Section -->
      <section class="card nodes-section">
        <div class="section-header">
          <h2>Provisioned Nodes</h2>
          <div class="node-count" id="node-count">0 nodes</div>
        </div>
        <div id="nodes" class="nodes-grid"></div>
        <div id="no-nodes" class="empty-state">No nodes provisioned yet</div>
      </section>

      <!-- Unprovisioned Devices Section -->
      <section class="card devices-section">
        <div class="section-header">
          <h2>Unprovisioned Devices</h2>
          <button class="btn btn-primary" onclick="refreshDevices()">
            <span class="icon">🔄</span>
            Refresh
          </button>
        </div>
        <div id="unprovisioned" class="devices-grid"></div>
        <div id="no-devices" class="empty-state">No unprovisioned devices found</div>
      </section>

      <!-- MQTT Configuration Section -->
      <section class="card mqtt-section">
        <div class="section-header">
          <h2>MQTT Configuration</h2>
          <div class="connection-status" id="mqtt-status">
            <span class="status-label">Status:</span>
            <span class="status-value" id="mqtt-state">Loading...</span>
          </div>
        </div>
        
        <form id="mqtt-config-form" class="mqtt-form">
          <div class="form-group">
            <label for="broker-host">Broker Host:</label>
            <input type="text" id="broker-host" name="broker_host" placeholder="192.168.1.100 or mqtt.example.com" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="broker-port">Port:</label>
              <input type="number" id="broker-port" name="broker_port" value="1883" min="1" max="65535" required>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="use-ssl" name="use_ssl">
                Use SSL/TLS
              </label>
            </div>
          </div>
          
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="homeassistant" required>
          </div>
          
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter MQTT password" required>
            <button type="button" class="btn btn-small toggle-password" onclick="togglePassword()">👁️</button>
          </div>
          
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              <span class="icon">💾</span>
              Save Configuration
            </button>
            <button type="button" class="btn btn-warning" onclick="testConnection()">
              <span class="icon">🔧</span>
              Test Connection
            </button>
            <button type="button" class="btn btn-danger" onclick="clearCredentials()">
              <span class="icon">🗑️</span>
              Clear
            </button>
          </div>
        </form>
        
        <div id="mqtt-error" class="error-message" style="display: none;"></div>
      </section>

      <!-- Bridge Controls Section -->
      <section class="card controls-section">
        <div class="section-header">
          <h2>Bridge Controls</h2>
          <div class="memory-info" id="memory-info">
            <div class="memory-item">
              <span class="memory-label">Free Memory</span>
              <span class="memory-value" id="free-memory">-- KB</span>
            </div>
            <div class="memory-item">
              <span class="memory-label">Total Memory</span>
              <span class="memory-value" id="total-memory">-- KB</span>
            </div>
          </div>
        </div>
        <div class="controls-grid">
          <button class="btn btn-primary" onclick="sendBridgeMqttDiscovery()">
            <span class="icon">📡</span>
            Send MQTT Discovery
          </button>
          <button class="btn btn-primary" onclick="sendBridgeMqttStatus()">
            <span class="icon">📊</span>
            Send MQTT Status
          </button>
          <button class="btn btn-warning" onclick="restartBridge()">
            <span class="icon">🔄</span>
            Restart Bridge
          </button>
          <button class="btn btn-danger" onclick="resetWiFi()">
            <span class="icon">⚠️</span>
            Reset WiFi
          </button>
        </div>
      </section>

      <!-- Console Commands Section -->
      <section class="card commands-section">
        <h2>Available Commands</h2>
        <div id="console-commands" class="commands-list"></div>
      </section>
    </div>
  </main>

  <script src="/js/main.js"></script>

  <script>
    function startLogSocket() {
  const ws = new WebSocket("ws://" + location.host + "/ws/logs");

  ws.onmessage = event => {
    const log = document.getElementById("log-output");
    const line = event.data;

    let cls = "log-default";
    if (line.startsWith('E')) cls = "log-error";
    else if (line.startsWith('W')) cls = "log-warning";
    else if (line.startsWith('I')) cls = "log-info";

    const div = document.createElement("div");
    div.className = cls;
    div.textContent = line;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  };

  ws.onclose = () => setTimeout(startLogSocket, 2000);
  ws.onerror = () => ws.close();
}
startLogSocket();
</script>

</body>
</html>
